apiVersion: v1
kind: Pod
metadata:
  name: emptydir-pod
  labels:
    app: emptydir-app
spec:
  containers:
    - name: container-1
      image: busybox
      command:
        [
          'sh',
          '-c',
          'echo "Hello from container-1" > /data/container1.txt && sleep 3600',
        ]
      volumeMounts:
        - name: cache
          mountPath: /data
  volumes:
    - name: cache
      emptyDir: {}
