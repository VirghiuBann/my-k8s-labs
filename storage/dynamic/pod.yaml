apiVersion: v1
kind: Pod
metadata:
  name: demo-pod
spec:
  containers:
    - name: writer
      image: busybox
      command: ['sh', '-c']
      args:
        - |
          echo "Writing to file"
          echo "Hello from $(hostname) at $(date)" >> /data/log.txt
          sleep 3600
      volumeMounts:
        - name: demo-storage
          mountPath: /data
  volumes:
    - name: demo-storage
      persistentVolumeClaim:
        claimName: demo-pvc
