apiVersion: apps/v1
kind: Deployment
metadata:
  name: deployment-svc
spec:
  replicas: 3
  selector:
    matchLabels:
      app: hostname-app
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 300
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: hostname-app
    spec:
      containers:
        - name: hostname-pod
          image: virghiu/hostname-app:1.0.0
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: '64Mi'
              cpu: '250m'
            limits:
              memory: '128Mi'
              cpu: '500m'
